# Edit the pipeline.yml file
cat > .github/workflows/pipeline.yml << 'EOF'
name: ML Pipeline

on:
  push:
    branches: [main, failing-run]
  workflow_dispatch:

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install mlflow scikit-learn numpy pandas dvc

      - name: Setup DVC and pull data
        run: |
          # Try to pull DVC data, but don't fail if it doesn't work
          dvc pull || echo "No DVC remote configured, using fallback data"

      - name: Set MLflow URI
        run: echo "MLFLOW_TRACKING_URI=file://$(pwd)/mlruns" >> $GITHUB_ENV

      - name: Train model
        run: python train.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install mlflow

      - name: Set MLflow URI
        run: echo "MLFLOW_TRACKING_URI=file://$(pwd)/mlruns" >> $GITHUB_ENV

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check model performance
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          echo "docker build --build-arg RUN_ID=$RUN_ID -t model:$RUN_ID ."
EOF