name: MLOPs Assignment 5 Pipeline

on:
  push:
    branches: [ main, failing-run ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install dvc mlflow pandas scikit-learn

      - name: Train and Log
        run: |
          python create_data.py
          python train.py
          # Ensure model_info.txt exists for the next step
          if [ ! -f model_info.txt ]; then
            ls mlruns/0 -t | head -n 1 > model_info.txt
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-data
          path: |
            mlruns/
            model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install MLflow
        run: pip install mlflow

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ml-data

      - name: Logic - Check Threshold
        run: python check_threshold.py

      - name: Mock Build
        if: success()
        run: echo "Building Docker image for Run ID: $(cat model_info.txt)"